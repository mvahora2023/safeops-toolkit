name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: PSScriptAnalyzer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest `
            -Path .\SafeOpsToolkit\SafeOpsToolkit.psd1 `
            -ErrorAction Stop
          Write-Output "Manifest OK: $($manifest.Name) v$($manifest.Version)"

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module -Name PSScriptAnalyzer -RequiredVersion 1.22.0 `
            -Force -SkipPublisherCheck

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Import-Module PSScriptAnalyzer -RequiredVersion 1.22.0
          $results = Invoke-ScriptAnalyzer `
            -Path .\SafeOpsToolkit `
            -Settings .\PSScriptAnalyzerSettings.psd1 `
            -Recurse
          if ($results) {
            $results | Format-Table RuleName, Severity, ScriptName, Line, Message -AutoSize
            Write-Error "PSScriptAnalyzer found $($results.Count) issue(s)."
            exit 1
          }
          Write-Output 'PSScriptAnalyzer: no issues found.'

  # ── Tests ─────────────────────────────────────────────────────────────────
  test-ps51:
    name: "Pester — PS 5.1"
    needs: lint
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: powershell
        run: |
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck
          Import-Module Pester -RequiredVersion 5.7.1

      - name: Run Pester tests
        shell: powershell
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path         = '.\Tests'
          $config.Run.PassThru     = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled      = $true
          $config.TestResult.OutputPath   = 'TestResults\pester.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'

          New-Item -ItemType Directory -Force -Path TestResults | Out-Null
          $result = Invoke-Pester -Configuration $config

          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) test(s) failed."
            exit 1
          }

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-results-ps-5-1
          path: TestResults\pester.xml
          retention-days: 30

  test-ps7:
    name: "Pester — PS 7"
    needs: lint
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Install-Module -Name Pester -RequiredVersion 5.7.1 -Force -SkipPublisherCheck
          Import-Module Pester -RequiredVersion 5.7.1

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path         = '.\Tests'
          $config.Run.PassThru     = $true
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled      = $true
          $config.TestResult.OutputPath   = 'TestResults\pester.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          $config.CodeCoverage.Enabled    = $true
          $config.CodeCoverage.Path       = @(
            '.\SafeOpsToolkit\Public\*.ps1',
            '.\SafeOpsToolkit\Private\*.ps1'
          )

          New-Item -ItemType Directory -Force -Path TestResults | Out-Null
          $result = Invoke-Pester -Configuration $config

          $exitCode = 0
          if ($result.FailedCount -gt 0) {
            Write-Error "$($result.FailedCount) test(s) failed."
            $exitCode = 1
          }

          if ($null -ne $result.CodeCoverage) {
            $pct = [Math]::Round($result.CodeCoverage.CoveragePercent, 1)
            Write-Output "Code coverage: $pct%"
            if ($pct -lt 80) {
              Write-Error "Coverage $pct% is below the 80% threshold."
              $exitCode = 1
            }
          }

          exit $exitCode

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          files: TestResults\pester.xml

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-results-ps-7
          path: TestResults\pester.xml
          retention-days: 30
