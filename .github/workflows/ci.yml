name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Pester Tests — Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Validate the manifest first so a broken .psd1 produces a clear, early failure
      # rather than a confusing test-runner error.
      - name: Validate module manifest
        shell: pwsh
        run: |
          $manifest = Test-ModuleManifest `
            -Path .\SafeOpsToolkit\SafeOpsToolkit.psd1 `
            -ErrorAction Stop
          Write-Output "Manifest OK: $($manifest.Name) v$($manifest.Version)"

      - name: Install Pester
        shell: pwsh
        run: |
          # Force-install so the runner's pre-installed Pester 3/4 is not used.
          Install-Module -Name Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.0

      - name: Run Pester tests
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path        = '.\Tests'
          $config.Run.Exit        = $true   # non-zero exit code when any test fails
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled      = $true
          $config.TestResult.OutputPath   = 'TestResults\pester.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'
          New-Item -ItemType Directory -Force -Path TestResults | Out-Null
          Invoke-Pester -Configuration $config

      # Upload the NUnit XML so GitHub Actions can display a test-results summary.
      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        if: always()
        with:
          files: TestResults\pester.xml

      # Archive the raw XML as a downloadable artifact for offline inspection.
      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-results
          path: TestResults\pester.xml
          retention-days: 30
